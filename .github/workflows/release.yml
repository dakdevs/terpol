name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: terpol
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: terpol
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: terpol
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../terpol-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
      - uses: actions/upload-artifact@v4
        with:
          name: terpol-${{ matrix.target }}
          path: terpol-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: terpol-*.tar.gz

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "aarch64_macos=$(sha256sum terpol-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_macos=$(sha256sum terpol-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum terpol-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Checkout homebrew-terpol
        uses: actions/checkout@v4
        with:
          repository: dakdevs/homebrew-terpol
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-terpol
      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA_AARCH64_MACOS: ${{ steps.sha.outputs.aarch64_macos }}
          SHA_X86_64_MACOS: ${{ steps.sha.outputs.x86_64_macos }}
          SHA_X86_64_LINUX: ${{ steps.sha.outputs.x86_64_linux }}
        run: |
          V="${VERSION#v}"
          cat > homebrew-terpol/Formula/terpol.rb << FORMULA
          class Terpol < Formula
            desc "Secret-injecting MITM proxy"
            homepage "https://github.com/dakdevs/terpol"
            version "${V}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/dakdevs/terpol/releases/download/v${V}/terpol-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MACOS}"
              end

              on_arm do
                url "https://github.com/dakdevs/terpol/releases/download/v${V}/terpol-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_MACOS}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/dakdevs/terpol/releases/download/v${V}/terpol-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "terpol"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/terpol --version")
            end
          end
          FORMULA
          sed -i 's/^          //' homebrew-terpol/Formula/terpol.rb
      - name: Commit and push
        run: |
          cd homebrew-terpol
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/terpol.rb
          git commit -m "Update terpol to ${GITHUB_REF_NAME}"
          git push
